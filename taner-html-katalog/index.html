<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Taner İş Kıyafetleri | Dijital Katalog</title>
  <style>
    :root {
      --bg: #05060a;
      --bg-2: #090d16;
      --text: #f8fafc;
      --muted: #97a3b6;
      --soft: rgba(255,255,255,.08);
      --soft-2: rgba(255,255,255,.13);
      --line: rgba(255,255,255,.13);
      --line-strong: rgba(255,255,255,.24);
      --orange: #f97316;
      --orange-2: #fb923c;
      --orange-3: #fed7aa;
      --blue: #38bdf8;
      --green: #22c55e;
      --shadow: 0 28px 90px rgba(0,0,0,.42);
      --radius-xl: 36px;
      --radius-lg: 28px;
      --radius-md: 20px;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 15% 8%, rgba(249,115,22,.40), transparent 25%),
        radial-gradient(circle at 86% 9%, rgba(56,189,248,.22), transparent 28%),
        radial-gradient(circle at 62% 100%, rgba(249,115,22,.28), transparent 34%),
        linear-gradient(145deg, #05060a 0%, #0d1422 44%, #05060a 100%);
    }

    body::after {
      opacity: .34;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 74%);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(24px);
      opacity: .72;
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 9s ease-in-out infinite alternate;
    }

    .orb.one { width: 160px; height: 160px; left: -60px; top: 26%; background: rgba(249,115,22,.22); }
    .orb.two { width: 180px; height: 180px; right: -76px; bottom: 20%; background: rgba(56,189,248,.15); animation-delay: -3s; }

    @keyframes floatOrb {
      from { transform: translate3d(0, -14px, 0) scale(1); }
      to { transform: translate3d(18px, 18px, 0) scale(1.12); }
    }

    .slider {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      transform: translateX(0);
      transition: transform .48s var(--ease);
      will-change: transform;
    }

    .page {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255,255,255,.055);
      border-radius: 38px;
      pointer-events: none;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 118px;
      z-index: 3;
    }

    .logo-wrap {
      position: relative;
      height: 112px;
      min-width: 274px;
      border: 1px solid rgba(255,255,255,.28);
      background:
        linear-gradient(135deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px 20px;
      box-shadow: 0 24px 70px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.80);
      overflow: hidden;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,.70) 42%, transparent 58%);
      transform: translateX(-120%);
      animation: shine 5.8s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 58% { transform: translateX(-120%); }
      78%, 100% { transform: translateX(120%); }
    }

    .logo { position: relative; z-index: 1; height: 100px; max-width: 242px; object-fit: contain; }

    .counter {
      position: relative;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(18px) saturate(140%);
      border-radius: 999px;
      padding: 10px 15px;
      color: #e7eef8;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .10em;
      box-shadow: 0 18px 45px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.08);
      white-space: nowrap;
    }

    .home-hero {
      flex: 1;
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 16px;
      padding-top: 8px;
      padding-bottom: 34px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 56dvh;
      border-radius: 42px;
      border: 1px solid var(--line);
      background:
        linear-gradient(150deg, rgba(255,255,255,.17), rgba(255,255,255,.055)),
        radial-gradient(circle at 84% 12%, rgba(249,115,22,.24), transparent 32%);
      backdrop-filter: blur(26px) saturate(145%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: .35;
      mask-image: linear-gradient(to bottom, black, transparent 72%);
    }

    .hero-badge {
      position: relative;
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(249,115,22,.28);
      background: rgba(249,115,22,.12);
      color: var(--orange-3);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 99px;
      background: var(--green);
      box-shadow: 0 0 18px rgba(34,197,94,.8);
    }

    .hero-title {
      position: relative;
      margin: 0;
      max-width: 410px;
      font-size: clamp(45px, 12vw, 74px);
      line-height: .88;
      letter-spacing: -3.8px;
      font-weight: 1000;
    }

    .hero-title span {
      background: linear-gradient(92deg, #fff 0%, #fed7aa 56%, #fb923c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      position: relative;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      max-width: 360px;
    }

    .hero-products {
      position: relative;
      height: min(34dvh, 305px);
      margin-top: 12px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 0;
    }

    .hero-products::before {
      content: "";
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 2px;
      height: 66px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(249,115,22,.34), transparent 66%);
      filter: blur(2px);
    }

    .hero-products img {
      position: relative;
      height: 100%;
      width: 37%;
      object-fit: contain;
      filter: drop-shadow(0 28px 24px rgba(0,0,0,.42));
      margin: 0 -19px;
      transform: translateZ(0);
      animation: productFloat 4.8s ease-in-out infinite alternate;
    }

    .hero-products img:nth-child(2) { transform: scale(1.09); z-index: 2; animation-delay: -.8s; }
    .hero-products img:nth-child(3) { animation-delay: -1.5s; }

    @keyframes productFloat {
      from { translate: 0 0; }
      to { translate: 0 -9px; }
    }

    .site-link {
      position: relative;
      justify-self: center;
      border: 1px solid rgba(249,115,22,.22);
      background: rgba(249,115,22,.10);
      color: #fb923c;
      border-radius: 999px;
      padding: 11px 17px;
      font-weight: 950;
      letter-spacing: .10em;
      font-size: 12px;
      box-shadow: 0 16px 44px rgba(0,0,0,.18);
    }

    .product-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1.08fr) auto auto;
      gap: 12px;
      padding-top: 10px;
    }

    .product-image-card {
      min-height: 0;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 40px;
      background:
        linear-gradient(155deg, rgba(255,255,255,.17), rgba(255,255,255,.055)),
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.13), transparent 34%);
      backdrop-filter: blur(26px) saturate(140%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .product-image-card::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 32px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: .62;
      mask-image: radial-gradient(circle at 50% 44%, black, transparent 76%);
    }

    .product-image-card::after {
      content: "";
      position: absolute;
      inset: auto 8% -36px 8%;
      height: 104px;
      background: radial-gradient(ellipse, rgba(249,115,22,.38), transparent 66%);
      filter: blur(2px);
    }

    .main-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 28px 24px rgba(0,0,0,.44));
      transition: opacity .20s ease, transform .24s var(--ease), filter .24s var(--ease);
    }

    .image-pair {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 4px 20px;
    }

    .image-pair .main-image {
      flex: 0 1 49%;
      width: 49%;
      max-width: 49%;
      height: 100%;
      object-fit: contain;
      transform: none !important;
    }

    .product-code, .color-name {
      position: absolute;
      z-index: 3;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(5,6,10,.54);
      backdrop-filter: blur(16px) saturate(145%);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 950;
      box-shadow: 0 14px 32px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .product-code { top: 16px; left: 16px; color: #e2e8f0; letter-spacing: .10em; }
    .color-name { right: 16px; bottom: 16px; color: #fff; }

    .thumbs {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      overflow: hidden;
    }

    .thumb {
      position: relative;
      width: 62px;
      height: 62px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 22px;
      background: rgba(255,255,255,.90);
      overflow: hidden;
      padding: 4px;
      cursor: pointer;
      flex: 0 0 auto;
      box-shadow: 0 15px 34px rgba(0,0,0,.20);
      transition: transform .22s var(--ease), border-color .22s ease, box-shadow .22s ease;
    }

    .thumb:active { transform: scale(.94); }
    .thumb.active {
      border-color: rgba(251,146,60,.95);
      box-shadow: 0 0 0 3px rgba(249,115,22,.22), 0 18px 42px rgba(0,0,0,.24);
      transform: translateY(-2px);
    }

    .thumb.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 5px;
      translate: -50% 0;
      width: 18px;
      height: 3px;
      border-radius: 99px;
      background: var(--orange);
    }

    .thumb img { width: 100%; height: 100%; object-fit: contain; }

    .product-info {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.055));
      backdrop-filter: blur(24px) saturate(140%);
      padding: 17px;
      box-shadow: 0 22px 64px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
    }

    .product-info::before {
      content: "";
      position: absolute;
      top: -70px;
      right: -70px;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(249,115,22,.18), transparent 70%);
    }

    .category {
      position: relative;
      margin: 0 0 7px;
      color: var(--orange-2);
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(28px, 7.8vw, 42px);
      line-height: .96;
      letter-spacing: -1.9px;
      font-weight: 1000;
    }

    .desc {
      position: relative;
      margin: 9px 0 0;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.48;
    }

    .mini-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .mini-card {
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 20px;
      background: rgba(255,255,255,.07);
      padding: 11px;
      min-height: 60px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .mini-title {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .mini-text {
      margin-top: 5px;
      color: #fff;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.25;
    }

    .features {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .feature {
      border: 1px solid rgba(249,115,22,.25);
      background: rgba(249,115,22,.12);
      color: var(--orange-3);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
      z-index: 10;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.28);
      transition: .28s var(--ease);
    }

    .dot.active {
      width: 34px;
      background: linear-gradient(90deg, var(--orange), var(--orange-2));
      box-shadow: 0 0 22px rgba(249,115,22,.44);
    }

    @media (max-height: 730px) {
      .page { padding: 12px 14px; }
      .topbar { min-height: 90px; }
      .logo-wrap { height: 86px; min-width: 214px; border-radius: 24px; padding: 5px 14px; }
      .logo { height: 76px; max-width: 188px; }
      .hero-card { min-height: 52dvh; padding: 19px; border-radius: 34px; }
      .hero-badge { margin-bottom: 10px; padding: 7px 10px; font-size: 10px; }
      .hero-title { font-size: clamp(37px, 11vw, 55px); letter-spacing: -2.8px; }
      .hero-subtitle { font-size: 13px; line-height: 1.45; }
      .hero-products { height: min(30dvh, 220px); }
      .product-layout { gap: 9px; }
      .product-image-card { border-radius: 32px; }
      .image-pair { gap: 4px; padding: 6px 2px 16px; }
      .image-pair .main-image { flex-basis: 48%; width: 48%; max-width: 48%; }
      .thumbs { min-height: 52px; gap: 8px; }
      .thumb { width: 52px; height: 52px; border-radius: 17px; }
      .product-info { padding: 13px; border-radius: 27px; }
      .desc { font-size: 12px; line-height: 1.35; }
      .feature { font-size: 10px; padding: 6px 8px; }
      h1 { font-size: clamp(25px, 7.4vw, 36px); }
    }

    @media (min-width: 760px) {
      .page { padding-left: max(28px, calc((100vw - 520px) / 2)); padding-right: max(28px, calc((100vw - 520px) / 2)); }
      .page::before { inset-left: max(16px, calc((100vw - 552px) / 2)); inset-right: max(16px, calc((100vw - 552px) / 2)); }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <section class="slider" id="slider"></section>
    <div class="dots" id="dots"></div>
  </main>

  <script>
    const products = [
      {
        id: "001",
        name: "Polar İş Montu",
        category: "Kışlık İş Kıyafeti",
        code: "TP-001",
        description: "Soğuk çalışma ortamları için tasarlanmış, fermuarlı, dik yakalı ve çok cepli polar iş montu.",
        fabric: "Polar kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Dik yaka", "Fermuarlı", "Yan cepler", "Kol cep", "Rahat kalıp"],
        colors: [
          { name: "Kırmızı", src: "images/polar/polar-kirmizi.webp", backSrc: "images/polar/polar-kirmizi-arka.webp" },
          { name: "Siyah", src: "images/polar/polar-siyah.webp", backSrc: "images/polar/polar-siyah-arka.webp" },
          { name: "Gri", src: "images/polar/polar-gri.webp", backSrc: "images/polar/polar-gri-arka.webp" }
        ]
      },
      {
        id: "002",
        name: "Polo Yaka Uzun Kollu Tişört",
        category: "Kurumsal İş Giyimi",
        code: "TP-002",
        description: "Günlük kullanım ve kurumsal ekip kıyafetleri için sade, şık ve konforlu polo yaka uzun kollu tişört.",
        fabric: "Pamuk karışımlı örme kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Polo yaka", "Uzun kollu", "Düğmeli", "Konforlu", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/polo/polo-gri.webp" },
          { name: "Lacivert", src: "images/polo/polo-lacivert.webp" },
          { name: "Siyah", src: "images/polo/polo-siyah.webp" }
        ]
      },
      {
        id: "003",
        name: "Yuvarlak Yaka Tişört",
        category: "Temel İş Giyimi",
        code: "TP-003",
        description: "Ekip kullanımı, promosyon ve günlük iş kıyafeti ihtiyaçları için sade yuvarlak yaka tişört.",
        fabric: "Pamuk karışımlı tişört kumaşı",
        sizes: "S - M - L - XL - XXL",
        features: ["Yuvarlak yaka", "Kısa kollu", "Hafif", "Düz renk", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/tshirt/tshirt-gri.webp" },
          { name: "Kırmızı", src: "images/tshirt/tshirt-kirmizi.webp" },
          { name: "Sarı", src: "images/tshirt/tshirt-sari.webp" },
          { name: "Siyah", src: "images/tshirt/tshirt-siyah.webp" }
        ]
      }
    ];

    const slider = document.getElementById("slider");
    const dots = document.getElementById("dots");
    const app = document.getElementById("app");

    let page = 0;
    let selectedColors = products.map(() => 0);
    let startX = 0;
    let startY = 0;
    let isPointerDown = false;

    function homePage() {
      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">01 / 04</div>
          </div>

          <div class="home-hero">
            <div class="hero-card">
              <div>
                <div class="hero-badge">Yeni Dijital Katalog</div>
                <h1 class="hero-title">İş giyimde <span>güçlü görünüm.</span></h1>
                <p class="hero-subtitle">Polar, polo yaka ve yuvarlak yaka ürün seçenekleriyle modern iş kıyafeti koleksiyonu.</p>
              </div>

              <div class="hero-products">
                <img src="images/tshirt/tshirt-siyah.webp" alt="Yuvarlak Yaka Tişört">
                <img src="images/polar/polar-kirmizi.webp" alt="Polar İş Montu">
                <img src="images/polo/polo-lacivert.webp" alt="Polo Yaka Tişört">
              </div>
            </div>

            <div class="site-link">www.taner.com.tr</div>
          </div>
        </article>
      `;
    }

    function productPage(product, index) {
      const colorIndex = selectedColors[index];
      const color = product.colors[colorIndex];
      const mainVisual = color.backSrc
        ? `<div class="image-pair">
            <img class="main-image" src="${color.src}" alt="${product.name} ${color.name} ön görünüm">
            <img class="main-image" src="${color.backSrc}" alt="${product.name} ${color.name} arka görünüm">
          </div>`
        : `<img class="main-image" src="${color.src}" alt="${product.name} ${color.name}">`;

      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">${String(index + 2).padStart(2, "0")} / 04</div>
          </div>

          <div class="product-layout">
            <div class="product-image-card">
              ${mainVisual}
              <div class="product-code">${product.code}</div>
              <div class="color-name">${color.name}</div>
            </div>

            <div class="thumbs">
              ${product.colors.map((c, i) => `
                <button class="thumb ${i === colorIndex ? "active" : ""}" onclick="selectColor(${index}, ${i})" aria-label="${c.name}">
                  <img src="${c.src}" alt="${c.name}">
                </button>
              `).join("")}
            </div>

            <div class="product-info">
              <p class="category">${product.category}</p>
              <h1>${product.name}</h1>
              <p class="desc">${product.description}</p>

              <div class="mini-grid">
                <div class="mini-card">
                  <div class="mini-title">Kumaş</div>
                  <div class="mini-text">${product.fabric}</div>
                </div>
                <div class="mini-card">
                  <div class="mini-title">Beden</div>
                  <div class="mini-text">${product.sizes}</div>
                </div>
              </div>

              <div class="features">
                ${product.features.map(f => `<span class="feature">${f}</span>`).join("")}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      slider.innerHTML = homePage() + products.map((p, i) => productPage(p, i)).join("");
      dots.innerHTML = Array.from({ length: products.length + 1 }, (_, i) => `<span class="dot ${i === page ? "active" : ""}"></span>`).join("");
      updateSlider();
    }

    function updateSlider() {
      slider.style.transform = `translateX(${-page * 100}vw)`;
      dots.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === page));
    }

    function goNext() {
      page = Math.min(page + 1, products.length);
      updateSlider();
    }

    function goPrev() {
      page = Math.max(page - 1, 0);
      updateSlider();
    }

    function selectColor(productIndex, colorIndex) {
      selectedColors[productIndex] = colorIndex;
      render();
    }

    function onStart(x, y) {
      isPointerDown = true;
      startX = x;
      startY = y;
    }

    function onEnd(x, y) {
      if (!isPointerDown) return;
      isPointerDown = false;
      const diffX = x - startX;
      const diffY = y - startY;
      if (Math.abs(diffX) < 55 || Math.abs(diffX) < Math.abs(diffY)) return;
      if (diffX < 0) goNext();
      if (diffX > 0) goPrev();
    }

    app.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    app.addEventListener("touchend", e => onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY), { passive: true });

    app.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
    app.addEventListener("mouseup", e => onEnd(e.clientX, e.clientY));

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") goNext();
      if (e.key === "ArrowLeft") goPrev();
    });

    render();
  </script>
</body>
</html>
