<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Taner İş Kıyafetleri | Dijital Katalog</title>
  <style>
    :root {
      --bg: #030712;
      --bg2: #080f1f;
      --glass: rgba(255,255,255,.075);
      --glass-strong: rgba(255,255,255,.13);
      --text: #f8fafc;
      --muted: #a8b3c7;
      --line: rgba(255,255,255,.14);
      --line-strong: rgba(255,255,255,.22);
      --orange: #ff7a18;
      --orange-2: #ffb057;
      --cyan: #38bdf8;
      --shadow: 0 28px 90px rgba(0,0,0,.42);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,122,24,.50), transparent 25%),
        radial-gradient(circle at 92% 14%, rgba(56,189,248,.26), transparent 24%),
        radial-gradient(circle at 52% 104%, rgba(255,122,24,.22), transparent 34%),
        linear-gradient(135deg, #020617 0%, #0b1224 42%, #030712 100%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: .22;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at 50% 30%, #000, transparent 70%);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .slider {
      height: 100%;
      display: flex;
      transform: translateX(0);
      transition: transform .55s cubic-bezier(.2, .9, .2, 1);
      will-change: transform;
    }

    .page {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 34px;
      pointer-events: none;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 118px;
      z-index: 2;
    }

    .logo-wrap {
      height: 112px;
      min-width: 282px;
      border: 1px solid rgba(255,255,255,.28);
      background:
        linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,255,255,.80));
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 20px;
      box-shadow: 0 24px 70px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.95);
    }

    .logo { height: 102px; max-width: 245px; object-fit: contain; }

    .counter {
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(22px);
      border-radius: 999px;
      padding: 11px 15px;
      color: #f1f5f9;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .10em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 14px 34px rgba(0,0,0,.22);
    }

    .home-hero {
      flex: 1;
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 16px;
      padding-top: 8px;
      padding-bottom: 24px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 56dvh;
      border-radius: 42px;
      border: 1px solid var(--line-strong);
      background:
        linear-gradient(160deg, rgba(255,255,255,.18), rgba(255,255,255,.055) 48%, rgba(255,122,24,.08)),
        rgba(255,255,255,.045);
      backdrop-filter: blur(28px) saturate(150%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -90px -90px auto auto;
      width: 310px;
      height: 310px;
      background: radial-gradient(circle, rgba(255,122,24,.56), transparent 66%);
      filter: blur(2px);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto auto -120px -110px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(56,189,248,.20), transparent 68%);
    }

    .hero-title {
      position: relative;
      margin: 0;
      max-width: 400px;
      font-size: clamp(46px, 13vw, 78px);
      line-height: .86;
      letter-spacing: -4px;
      font-weight: 1000;
      text-wrap: balance;
    }

    .hero-title::after {
      content: "";
      display: block;
      width: 94px;
      height: 5px;
      margin-top: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--orange-2), transparent);
    }

    .hero-subtitle {
      position: relative;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
      max-width: 350px;
    }

    .hero-products {
      position: relative;
      height: min(35dvh, 310px);
      margin-top: 10px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 0;
    }

    .hero-products::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 6px;
      height: 34px;
      background: radial-gradient(ellipse, rgba(255,122,24,.34), transparent 70%);
      filter: blur(4px);
    }

    .hero-products img {
      height: 100%;
      width: 36%;
      object-fit: contain;
      filter: drop-shadow(0 30px 24px rgba(0,0,0,.48));
      margin: 0 -17px;
      animation: floatItem 4.8s ease-in-out infinite;
    }

    .hero-products img:nth-child(2) { transform: scale(1.10); z-index: 2; animation-delay: -.8s; }
    .hero-products img:nth-child(3) { animation-delay: -1.5s; }

    @keyframes floatItem {
      0%,100% { translate: 0 0; }
      50% { translate: 0 -8px; }
    }

    .site-link {
      text-align: center;
      color: #fff !important;
      font-weight: 950 !important;
      letter-spacing: .14em !important;
      font-size: 12px;
      text-transform: uppercase;
      border: 1px solid rgba(255,122,24,.28);
      background: linear-gradient(90deg, rgba(255,122,24,.12), rgba(255,255,255,.06), rgba(255,122,24,.12));
      backdrop-filter: blur(16px);
      border-radius: 999px;
      padding: 12px 16px;
      box-shadow: 0 18px 44px rgba(0,0,0,.18);
    }

    .swipe-hint { display: none; }

    .product-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1.08fr) auto auto;
      gap: 12px;
      padding-top: 8px;
    }

    .product-image-card {
      min-height: 0;
      position: relative;
      border: 1px solid var(--line-strong);
      border-radius: 40px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.15), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.045));
      backdrop-filter: blur(24px) saturate(145%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.14);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .product-image-card::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.08);
      pointer-events: none;
    }

    .product-image-card::after {
      content: "";
      position: absolute;
      inset: auto 7% -44px 7%;
      height: 110px;
      background: radial-gradient(ellipse, rgba(255,122,24,.38), transparent 68%);
      filter: blur(4px);
    }

    .main-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 30px 25px rgba(0,0,0,.46));
      transition: opacity .22s ease, transform .22s ease;
    }

    .image-pair {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 4px 20px;
    }

    .image-pair .main-image {
      flex: 0 1 49%;
      width: 49%;
      max-width: 49%;
      height: 100%;
      object-fit: contain;
      transform: none !important;
    }

    .product-code, .color-name {
      position: absolute;
      z-index: 2;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(3,7,18,.58);
      backdrop-filter: blur(18px);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 14px 36px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.10);
    }

    .product-code { top: 16px; left: 16px; color: #fff; }
    .color-name { right: 16px; bottom: 16px; color: #fed7aa; }

    .thumbs {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      overflow: hidden;
      padding: 0 2px;
    }

    .thumb {
      width: 62px;
      height: 62px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 21px;
      background: linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,255,255,.78));
      overflow: hidden;
      padding: 4px;
      cursor: pointer;
      flex: 0 0 auto;
      box-shadow: 0 14px 34px rgba(0,0,0,.22);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .thumb:active { transform: scale(.96); }

    .thumb.active {
      border-color: var(--orange-2);
      box-shadow: 0 0 0 4px rgba(255,122,24,.22), 0 18px 40px rgba(0,0,0,.26);
      transform: translateY(-2px);
    }

    .thumb img { width: 100%; height: 100%; object-fit: contain; }

    .product-info {
      border: 1px solid var(--line-strong);
      border-radius: 32px;
      background:
        linear-gradient(155deg, rgba(255,255,255,.13), rgba(255,255,255,.055));
      backdrop-filter: blur(22px) saturate(140%);
      padding: 17px;
      box-shadow: 0 22px 64px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
    }

    .category {
      margin: 0 0 8px;
      color: var(--orange-2);
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .20em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 43px);
      line-height: .94;
      letter-spacing: -2px;
      font-weight: 1000;
      text-wrap: balance;
    }

    .desc {
      margin: 10px 0 0;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.48;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 13px;
    }

    .mini-card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      background: rgba(255,255,255,.07);
      padding: 11px;
      min-height: 60px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .mini-title {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .mini-text {
      margin-top: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.25;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 11px;
    }

    .feature {
      border: 1px solid rgba(255,122,24,.30);
      background: linear-gradient(145deg, rgba(255,122,24,.18), rgba(255,122,24,.08));
      color: #fed7aa;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
      z-index: 10;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.25);
      transition: .28s ease;
    }

    .dot.active {
      width: 34px;
      background: linear-gradient(90deg, var(--orange), var(--orange-2));
      box-shadow: 0 0 22px rgba(255,122,24,.38);
    }

    @media (max-height: 730px) {
      .page { padding: 12px 14px; }
      .page::before { inset: 8px; border-radius: 28px; }
      .topbar { min-height: 92px; }
      .logo-wrap { height: 88px; min-width: 218px; border-radius: 24px; padding: 5px 14px; }
      .logo { height: 78px; max-width: 190px; }
      .hero-card { min-height: 52dvh; padding: 20px; border-radius: 34px; }
      .hero-title { font-size: clamp(38px, 11vw, 58px); letter-spacing: -3px; }
      .hero-subtitle { font-size: 13px; line-height: 1.45; }
      .hero-products { height: min(30dvh, 230px); }
      .product-layout { gap: 9px; }
      .product-image-card { border-radius: 32px; }
      .image-pair { gap: 4px; padding: 6px 2px 16px; }
      .image-pair .main-image { flex-basis: 48%; width: 48%; max-width: 48%; }
      .thumb, .thumbs { height: 52px; }
      .thumb { width: 52px; border-radius: 17px; }
      .product-info { padding: 13px; border-radius: 26px; }
      .desc { font-size: 12px; line-height: 1.35; }
      .feature { font-size: 10px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="slider" id="slider"></section>
    <div class="dots" id="dots"></div>
  </main>

  <script>
    const products = [
      {
        id: "001",
        name: "Polar İş Montu",
        category: "Kışlık İş Kıyafeti",
        code: "TP-001",
        description: "Soğuk çalışma ortamları için tasarlanmış, fermuarlı, dik yakalı ve çok cepli polar iş montu.",
        fabric: "Polar kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Dik yaka", "Fermuarlı", "Yan cepler", "Kol cep", "Rahat kalıp"],
        colors: [
          { name: "Kırmızı", src: "images/polar/polar-kirmizi.webp", backSrc: "images/polar/polar-kirmizi-arka.webp" },
          { name: "Siyah", src: "images/polar/polar-siyah.webp", backSrc: "images/polar/polar-siyah-arka.webp" },
          { name: "Gri", src: "images/polar/polar-gri.webp", backSrc: "images/polar/polar-gri-arka.webp" }
        ]
      },
      {
        id: "002",
        name: "Polo Yaka Uzun Kollu Tişört",
        category: "Kurumsal İş Giyimi",
        code: "TP-002",
        description: "Günlük kullanım ve kurumsal ekip kıyafetleri için sade, şık ve konforlu polo yaka uzun kollu tişört.",
        fabric: "Pamuk karışımlı örme kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Polo yaka", "Uzun kollu", "Düğmeli", "Konforlu", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/polo/polo-gri.webp" },
          { name: "Lacivert", src: "images/polo/polo-lacivert.webp" },
          { name: "Siyah", src: "images/polo/polo-siyah.webp" }
        ]
      },
      {
        id: "003",
        name: "Yuvarlak Yaka Tişört",
        category: "Temel İş Giyimi",
        code: "TP-003",
        description: "Ekip kullanımı, promosyon ve günlük iş kıyafeti ihtiyaçları için sade yuvarlak yaka tişört.",
        fabric: "Pamuk karışımlı tişört kumaşı",
        sizes: "S - M - L - XL - XXL",
        features: ["Yuvarlak yaka", "Kısa kollu", "Hafif", "Düz renk", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/tshirt/tshirt-gri.webp" },
          { name: "Kırmızı", src: "images/tshirt/tshirt-kirmizi.webp" },
          { name: "Sarı", src: "images/tshirt/tshirt-sari.webp" },
          { name: "Siyah", src: "images/tshirt/tshirt-siyah.webp" }
        ]
      }
    ];

    const slider = document.getElementById("slider");
    const dots = document.getElementById("dots");
    const app = document.getElementById("app");

    let page = 0;
    let selectedColors = products.map(() => 0);
    let startX = 0;
    let startY = 0;
    let isPointerDown = false;

    function homePage() {
      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">01 / 04</div>
          </div>

          <div class="home-hero">
            <div class="hero-card">
              <div>
                <h1 class="hero-title">Profesyonel ekipler için modern iş giyimi.</h1>
                <p class="hero-subtitle">Polar, polo yaka ve yuvarlak yaka seçenekleriyle şık, net ve mobil uyumlu dijital katalog deneyimi.</p>
              </div>

              <div class="hero-products">
                <img src="images/tshirt/tshirt-siyah.webp" alt="Yuvarlak Yaka Tişört">
                <img src="images/polar/polar-kirmizi.webp" alt="Polar İş Montu">
                <img src="images/polo/polo-lacivert.webp" alt="Polo Yaka Tişört">
              </div>
            </div>

            <div class="site-link" style="text-align:center;color:#fb923c;font-weight:800;letter-spacing:.08em;">www.taner.com.tr</div>
          </div>
        </article>
      `;
    }

    function productPage(product, index) {
      const colorIndex = selectedColors[index];
      const color = product.colors[colorIndex];
      const mainVisual = color.backSrc
        ? `<div class="image-pair">
            <img class="main-image" src="${color.src}" alt="${product.name} ${color.name} ön görünüm">
            <img class="main-image" src="${color.backSrc}" alt="${product.name} ${color.name} arka görünüm">
          </div>
          `
        : `<img class="main-image" src="${color.src}" alt="${product.name} ${color.name}">`;

      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">${String(index + 2).padStart(2, "0")} / 04</div>
          </div>

          <div class="product-layout">
            <div class="product-image-card">
              ${mainVisual}
              <div class="product-code">${product.code}</div>
              <div class="color-name">${color.name}</div>
            </div>

            <div class="thumbs">
              ${product.colors.map((c, i) => `
                <button class="thumb ${i === colorIndex ? "active" : ""}" onclick="selectColor(${index}, ${i})" aria-label="${c.name}">
                  <img src="${c.src}" alt="${c.name}">
                </button>
              `).join("")}
            </div>

            <div class="product-info">
              <p class="category">${product.category}</p>
              <h1>${product.name}</h1>
              <p class="desc">${product.description}</p>

              <div class="mini-grid">
                <div class="mini-card">
                  <div class="mini-title">Kumaş</div>
                  <div class="mini-text">${product.fabric}</div>
                </div>
                <div class="mini-card">
                  <div class="mini-title">Beden</div>
                  <div class="mini-text">${product.sizes}</div>
                </div>
              </div>

              <div class="features">
                ${product.features.map(f => `<span class="feature">${f}</span>`).join("")}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      slider.innerHTML = homePage() + products.map((p, i) => productPage(p, i)).join("");
      dots.innerHTML = Array.from({ length: products.length + 1 }, (_, i) => `<span class="dot ${i === page ? "active" : ""}"></span>`).join("");
      updateSlider();
    }

    function updateSlider() {
      slider.style.transform = `translateX(${-page * 100}vw)`;
      dots.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === page));
    }

    function goNext() {
      page = Math.min(page + 1, products.length);
      updateSlider();
    }

    function goPrev() {
      page = Math.max(page - 1, 0);
      updateSlider();
    }

    function selectColor(productIndex, colorIndex) {
      selectedColors[productIndex] = colorIndex;
      render();
    }

    function onStart(x, y) {
      isPointerDown = true;
      startX = x;
      startY = y;
    }

    function onEnd(x, y) {
      if (!isPointerDown) return;
      isPointerDown = false;
      const diffX = x - startX;
      const diffY = y - startY;
      if (Math.abs(diffX) < 55 || Math.abs(diffX) < Math.abs(diffY)) return;
      if (diffX < 0) goNext();
      if (diffX > 0) goPrev();
    }

    app.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    app.addEventListener("touchend", e => onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY), { passive: true });

    app.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
    app.addEventListener("mouseup", e => onEnd(e.clientX, e.clientY));

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") goNext();
      if (e.key === "ArrowLeft") goPrev();
    });

    render();
  </script>
</body>
</html>
