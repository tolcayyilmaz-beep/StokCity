<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Taner İş Kıyafetleri | Dijital Katalog</title>
  <style>
    :root {
      --bg: #070a12;
      --card: rgba(255,255,255,.08);
      --card-2: rgba(255,255,255,.12);
      --text: #f8fafc;
      --muted: #a7b0c0;
      --line: rgba(255,255,255,.14);
      --orange: #f97316;
      --orange-2: #fb923c;
      --dark: #0f172a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(249,115,22,.34), transparent 28%),
        radial-gradient(circle at 86% 8%, rgba(59,130,246,.20), transparent 27%),
        radial-gradient(circle at 50% 96%, rgba(249,115,22,.22), transparent 36%),
        linear-gradient(145deg, #070a12 0%, #101827 48%, #05070d 100%);
      pointer-events: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .slider {
      height: 100%;
      display: flex;
      transform: translateX(0);
      transition: transform .42s cubic-bezier(.22, 1, .36, 1);
      will-change: transform;
    }

    .page {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 56px;
      z-index: 2;
    }

    .logo-wrap {
      height: 56px;
      min-width: 116px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.20);
    }

    .logo { height: 76px; max-width: 280px; object-fit: contain; }

    .counter {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(18px);
      border-radius: 999px;
      padding: 10px 14px;
      color: #dbe3ef;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .home-hero {
      flex: 1;
      min-height: 0;
      display: grid;
      align-content: center;
      gap: 20px;
      padding-bottom: 28px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 54dvh;
      border-radius: 36px;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
      backdrop-filter: blur(22px);
      box-shadow: 0 26px 80px rgba(0,0,0,.36);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -60px -80px auto auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(249,115,22,.45), transparent 66%);
    }

    .hero-title {
      position: relative;
      margin: 0;
      max-width: 360px;
      font-size: clamp(43px, 13vw, 70px);
      line-height: .9;
      letter-spacing: -3px;
      font-weight: 950;
    }

    .hero-subtitle {
      position: relative;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      max-width: 330px;
    }

    .hero-products {
      position: relative;
      height: min(34dvh, 290px);
      margin-top: 12px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 0;
    }

    .hero-products img {
      height: 100%;
      width: 36%;
      object-fit: contain;
      filter: drop-shadow(0 24px 22px rgba(0,0,0,.36));
      margin: 0 -16px;
    }

    .hero-products img:nth-child(2) { transform: scale(1.08); z-index: 2; }

    .swipe-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,.56);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .swipe-line {
      width: 52px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
    }

    .product-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1.06fr) auto auto;
      gap: 12px;
      padding-top: 10px;
    }

    .product-image-card {
      min-height: 0;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(255,255,255,.15), rgba(255,255,255,.055));
      backdrop-filter: blur(20px);
      box-shadow: 0 22px 70px rgba(0,0,0,.30);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .product-image-card::after {
      content: "";
      position: absolute;
      inset: auto 8% -38px 8%;
      height: 90px;
      background: radial-gradient(ellipse, rgba(249,115,22,.30), transparent 66%);
    }

    .main-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 22px 22px rgba(0,0,0,.34));
      transition: opacity .18s ease, transform .18s ease;
    }

    .image-pair {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 4px 18px;
    }

    .image-pair .main-image {
      flex: 0 1 49%;
      width: 49%;
      max-width: 49%;
      height: 100%;
      object-fit: contain;
      transform: none !important;
    }

    .view-chip {
      position: absolute;
      z-index: 2;
      bottom: 14px;
      left: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(7,10,18,.60);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 900;
      color: #fed7aa;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .product-code, .color-name {
      position: absolute;
      z-index: 2;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(7,10,18,.60);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .product-code { top: 14px; left: 14px; }
    .color-name { right: 14px; bottom: 14px; color: #fff; }

    .thumbs {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 58px;
      overflow: hidden;
    }

    .thumb {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      overflow: hidden;
      padding: 3px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .thumb.active {
      border-color: var(--orange-2);
      box-shadow: 0 0 0 3px rgba(249,115,22,.22);
    }

    .thumb img { width: 100%; height: 100%; object-fit: contain; }

    .product-info {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(18px);
      padding: 16px;
      box-shadow: 0 18px 54px rgba(0,0,0,.24);
    }

    .category {
      margin: 0 0 7px;
      color: var(--orange-2);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 8vw, 41px);
      line-height: .98;
      letter-spacing: -1.7px;
      font-weight: 950;
    }

    .desc {
      margin: 9px 0 0;
      color: #c6cfdd;
      font-size: 13px;
      line-height: 1.45;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .mini-card {
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      padding: 10px;
      min-height: 58px;
    }

    .mini-title {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .mini-text {
      margin-top: 5px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .feature {
      border: 1px solid rgba(249,115,22,.22);
      background: rgba(249,115,22,.11);
      color: #fed7aa;
      border-radius: 999px;
      padding: 7px 9px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 7px;
      pointer-events: none;
      z-index: 10;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.28);
      transition: .25s ease;
    }

    .dot.active { width: 30px; background: var(--orange); }

    @media (max-height: 730px) {
      .page { padding: 12px 14px; }
      .topbar { min-height: 48px; }
      .logo-wrap { height: 46px; border-radius: 16px; }
      .logo { height: 64px; }
      .hero-card { min-height: 52dvh; padding: 18px; border-radius: 30px; }
      .hero-title { font-size: clamp(36px, 11vw, 54px); }
      .hero-subtitle { font-size: 13px; line-height: 1.45; }
      .hero-products { height: min(30dvh, 220px); }
      .product-layout { gap: 9px; }
      .image-pair { gap: 4px; padding: 6px 2px 16px; }
      .image-pair .main-image { flex-basis: 48%; width: 48%; max-width: 48%; }
      .thumb, .thumbs { height: 50px; }
      .thumb { width: 50px; border-radius: 15px; }
      .product-info { padding: 13px; border-radius: 24px; }
      .desc { font-size: 12px; line-height: 1.35; }
      .feature { font-size: 10px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="slider" id="slider"></section>
    <div class="dots" id="dots"></div>
  </main>

  <script>
    const products = [
      {
        id: "001",
        name: "Polar İş Montu",
        category: "Kışlık İş Kıyafeti",
        code: "TP-001",
        description: "Soğuk çalışma ortamları için tasarlanmış, fermuarlı, dik yakalı ve çok cepli polar iş montu.",
        fabric: "Polar kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Dik yaka", "Fermuarlı", "Yan cepler", "Kol cep", "Rahat kalıp"],
        colors: [
          { name: "Kırmızı", src: "images/polar/polar-kirmizi.webp", backSrc: "images/polar/polar-kirmizi-arka.webp" },
          { name: "Siyah", src: "images/polar/polar-siyah.webp", backSrc: "images/polar/polar-siyah-arka.webp" },
          { name: "Gri", src: "images/polar/polar-gri.webp", backSrc: "images/polar/polar-gri-arka.webp" }
        ]
      },
      {
        id: "002",
        name: "Polo Yaka Uzun Kollu Tişört",
        category: "Kurumsal İş Giyimi",
        code: "TP-002",
        description: "Günlük kullanım ve kurumsal ekip kıyafetleri için sade, şık ve konforlu polo yaka uzun kollu tişört.",
        fabric: "Pamuk karışımlı örme kumaş",
        sizes: "S - M - L - XL - XXL",
        features: ["Polo yaka", "Uzun kollu", "Düğmeli", "Konforlu", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/polo/polo-gri.webp" },
          { name: "Lacivert", src: "images/polo/polo-lacivert.webp" },
          { name: "Siyah", src: "images/polo/polo-siyah.webp" }
        ]
      },
      {
        id: "003",
        name: "Yuvarlak Yaka Tişört",
        category: "Temel İş Giyimi",
        code: "TP-003",
        description: "Ekip kullanımı, promosyon ve günlük iş kıyafeti ihtiyaçları için sade yuvarlak yaka tişört.",
        fabric: "Pamuk karışımlı tişört kumaşı",
        sizes: "S - M - L - XL - XXL",
        features: ["Yuvarlak yaka", "Kısa kollu", "Hafif", "Düz renk", "Baskıya uygun"],
        colors: [
          { name: "Gri", src: "images/tshirt/tshirt-gri.webp" },
          { name: "Kırmızı", src: "images/tshirt/tshirt-kirmizi.webp" },
          { name: "Sarı", src: "images/tshirt/tshirt-sari.webp" },
          { name: "Siyah", src: "images/tshirt/tshirt-siyah.webp" }
        ]
      }
    ];

    const slider = document.getElementById("slider");
    const dots = document.getElementById("dots");
    const app = document.getElementById("app");

    let page = 0;
    let selectedColors = products.map(() => 0);
    let startX = 0;
    let startY = 0;
    let isPointerDown = false;

    function homePage() {
      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">01 / 04</div>
          </div>

          <div class="home-hero">
            <div class="hero-card">
              <div>
                <h1 class="hero-title">İş giyimde güçlü görünüm.</h1>
                <p class="hero-subtitle">Polar, polo yaka ve yuvarlak yaka ürün seçenekleriyle modern iş kıyafeti koleksiyonu.</p>
              </div>

              <div class="hero-products">
                <img src="images/tshirt/tshirt-siyah.webp" alt="Yuvarlak Yaka Tişört">
                <img src="images/polar/polar-kirmizi.webp" alt="Polar İş Montu">
                <img src="images/polo/polo-lacivert.webp" alt="Polo Yaka Tişört">
              </div>
            </div>

            <div class="site-link" style="text-align:center;color:#fb923c;font-weight:800;letter-spacing:.08em;">www.taner.com.tr</div>
          </div>
        </article>
      `;
    }

    function productPage(product, index) {
      const colorIndex = selectedColors[index];
      const color = product.colors[colorIndex];
      const mainVisual = color.backSrc
        ? `<div class="image-pair">
            <img class="main-image" src="${color.src}" alt="${product.name} ${color.name} ön görünüm">
            <img class="main-image" src="${color.backSrc}" alt="${product.name} ${color.name} arka görünüm">
          </div>
          `
        : `<img class="main-image" src="${color.src}" alt="${product.name} ${color.name}">`;

      return `
        <article class="page">
          <div class="topbar">
            <div class="logo-wrap"><img class="logo" src="images/logo/logo.jpg" alt="Taner İş Kıyafetleri"></div>
            <div class="counter">${String(index + 2).padStart(2, "0")} / 04</div>
          </div>

          <div class="product-layout">
            <div class="product-image-card">
              ${mainVisual}
              <div class="product-code">${product.code}</div>
              <div class="color-name">${color.name}</div>
            </div>

            <div class="thumbs">
              ${product.colors.map((c, i) => `
                <button class="thumb ${i === colorIndex ? "active" : ""}" onclick="selectColor(${index}, ${i})" aria-label="${c.name}">
                  <img src="${c.src}" alt="${c.name}">
                </button>
              `).join("")}
            </div>

            <div class="product-info">
              <p class="category">${product.category}</p>
              <h1>${product.name}</h1>
              <p class="desc">${product.description}</p>

              <div class="mini-grid">
                <div class="mini-card">
                  <div class="mini-title">Kumaş</div>
                  <div class="mini-text">${product.fabric}</div>
                </div>
                <div class="mini-card">
                  <div class="mini-title">Beden</div>
                  <div class="mini-text">${product.sizes}</div>
                </div>
              </div>

              <div class="features">
                ${product.features.map(f => `<span class="feature">${f}</span>`).join("")}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      slider.innerHTML = homePage() + products.map((p, i) => productPage(p, i)).join("");
      dots.innerHTML = Array.from({ length: products.length + 1 }, (_, i) => `<span class="dot ${i === page ? "active" : ""}"></span>`).join("");
      updateSlider();
    }

    function updateSlider() {
      slider.style.transform = `translateX(${-page * 100}vw)`;
      dots.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === page));
    }

    function goNext() {
      page = Math.min(page + 1, products.length);
      updateSlider();
    }

    function goPrev() {
      page = Math.max(page - 1, 0);
      updateSlider();
    }

    function selectColor(productIndex, colorIndex) {
      selectedColors[productIndex] = colorIndex;
      render();
    }

    function onStart(x, y) {
      isPointerDown = true;
      startX = x;
      startY = y;
    }

    function onEnd(x, y) {
      if (!isPointerDown) return;
      isPointerDown = false;
      const diffX = x - startX;
      const diffY = y - startY;
      if (Math.abs(diffX) < 55 || Math.abs(diffX) < Math.abs(diffY)) return;
      if (diffX < 0) goNext();
      if (diffX > 0) goPrev();
    }

    app.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    app.addEventListener("touchend", e => onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY), { passive: true });

    app.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
    app.addEventListener("mouseup", e => onEnd(e.clientX, e.clientY));

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") goNext();
      if (e.key === "ArrowLeft") goPrev();
    });

    render();
  </script>
</body>
</html>
