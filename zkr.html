<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Zikir Admin Paneli</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 10px;
    }

    .container {
      max-width: 500px;
      background: #fff;
      padding: 16px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .date-row input {
      flex: 1;
      text-align: center;
      font-size: 15px;
    }

    .nav-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: #1d4ed8;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .save-btn {
      background: #16a34a;
      color: white;
      font-size: 16px;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .save-btn:hover {
      background: #15803d;
    }

    .delete-btn {
      background: #dc2626;
      color: white;
      font-size: 16px;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .status {
      margin-top: 12px;
      font-weight: bold;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Zikir Veri Giriş Paneli</h2>

  <div class="date-row">
    <button class="nav-btn" onclick="changeDate(-1)">◀</button>
    <input type="date" id="datePicker">
    <button class="nav-btn" onclick="changeDate(1)">▶</button>
  </div>

  <label>Zikir (Arapça)</label>
  <textarea id="zikirTextAr" rows="2"></textarea>

  <label>Okunuş (TR)</label>
  <input type="text" id="pronunciationTr">

  <label>Okunuş (EN)</label>
  <input type="text" id="pronunciationEn">

  <label>Okunuş (AR)</label>
  <input type="text" id="pronunciationAr">

  <label>Meal (TR)</label>
  <textarea id="mealTr" rows="2"></textarea>

  <label>Meal (EN)</label>
  <textarea id="mealEn" rows="2"></textarea>

  <label>Meal (AR)</label>
  <textarea id="mealAr" rows="2"></textarea>

  <label>Toplam Zikir</label>
  <input type="number" id="totalDhikr" value="0">

  <label>Toplam Katılımcı</label>
  <input type="number" id="totalParticipants" value="0">

  <div class="btn-row">
    <button class="save-btn" onclick="saveData()">💾 Kaydet / Güncelle</button>
    <button class="delete-btn" onclick="deleteData()">🗑 Kayıt Sil</button>
  </div>

  <div class="status" id="status"></div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTNOGduGplnuGI0hTUGIGilt_q6ojrCJc",
    authDomain: "namaztakipanalitik-cf0a3.firebaseapp.com",
    projectId: "namaztakipanalitik-cf0a3",
    storageBucket: "namaztakipanalitik-cf0a3.firebasestorage.app",
    messagingSenderId: "753795773645",
    appId: "1:753795773645:web:e73ae2e51cd55fb3722584"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const datePicker = document.getElementById("datePicker");

  datePicker.addEventListener("change", loadData);

  window.changeDate = function (offset) {
    if (!datePicker.value) return;

    const current = new Date(datePicker.value);
    current.setDate(current.getDate() + offset);

    const newDate = current.toISOString().split("T")[0];
    datePicker.value = newDate;
    loadData();
  };

  async function loadData() {
    const date = datePicker.value;
    if (!date) return;

    const ref = doc(db, "zikirler", date);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("zikirTextAr").value = data.zikirTextAr || "";
      document.getElementById("pronunciationTr").value = data.pronunciationTr || "";
      document.getElementById("pronunciationEn").value = data.pronunciationEn || "";
      document.getElementById("pronunciationAr").value = data.pronunciationAr || "";
      document.getElementById("mealTr").value = data.mealTr || "";
      document.getElementById("mealEn").value = data.mealEn || "";
      document.getElementById("mealAr").value = data.mealAr || "";
      document.getElementById("totalDhikr").value = data.totalDhikr || 0;
      document.getElementById("totalParticipants").value = data.totalParticipants || 0;

      document.getElementById("status").innerText = "Kayıt yüklendi.";
    } else {
      clearFields();
      document.getElementById("status").innerText = "Bu tarih için kayıt yok. Yeni veri girebilirsin.";
    }
  }

  function clearFields() {
    document.querySelectorAll("input, textarea").forEach(el => {
      if (el.id === "datePicker") return;
      if (el.type === "number") el.value = 0;
      else el.value = "";
    });
  }

  window.saveData = async function () {
    const date = datePicker.value;
    if (!date) {
      alert("Lütfen bir tarih seç!");
      return;
    }

    const data = {
      zikirTextAr: document.getElementById("zikirTextAr").value,
      pronunciationTr: document.getElementById("pronunciationTr").value,
      pronunciationEn: document.getElementById("pronunciationEn").value,
      pronunciationAr: document.getElementById("pronunciationAr").value,
      mealTr: document.getElementById("mealTr").value,
      mealEn: document.getElementById("mealEn").value,
      mealAr: document.getElementById("mealAr").value,
      totalDhikr: Number(document.getElementById("totalDhikr").value),
      totalParticipants: Number(document.getElementById("totalParticipants").value)
    };

    const ref = doc(db, "zikirler", date);
    await setDoc(ref, data, { merge: true });

    document.getElementById("status").innerText = "Kayıt başarıyla kaydedildi.";
  };

  window.deleteData = async function () {
    const date = datePicker.value;
    if (!date) {
      alert("Lütfen bir tarih seç!");
      return;
    }

    if (!confirm("Bu tarihe ait kaydı silmek istediğine emin misin?")) return;

    const ref = doc(db, "zikirler", date);
    await deleteDoc(ref);

    clearFields();
    document.getElementById("status").innerText = "Kayıt silindi.";
  };
</script>

</body>
</html>
