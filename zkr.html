<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Zikir Admin Paneli</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 10px;
      margin: 0;
    }

    .container {
      max-width: 500px;
      background: #fff;
      padding: 16px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .date-row input {
      flex: 1;
      text-align: center;
      font-size: 15px;
    }

    .nav-btn {
      background: #2563eb;
      color: white;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: #1d4ed8;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .save-btn {
      background: #16a34a;
      color: white;
      font-size: 16px;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .save-btn:hover {
      background: #15803d;
    }

    .delete-btn {
      background: #dc2626;
      color: white;
      font-size: 16px;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .status {
      margin-top: 12px;
      font-weight: bold;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .status.success {
      color: #15803d;
    }

    .status.error {
      color: #dc2626;
    }

    .status.info {
      color: #2563eb;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Zikir Veri Giriş Paneli</h2>

  <div class="date-row">
    <button class="nav-btn" onclick="changeDate(-1)">◀</button>
    <input type="date" id="datePicker">
    <button class="nav-btn" onclick="changeDate(1)">▶</button>
  </div>

  <label>Zikir (Arapça)</label>
  <textarea id="zikirTextAr" rows="2"></textarea>

  <label>Okunuş (TR)</label>
  <input type="text" id="pronunciationTr">

  <label>Okunuş (EN)</label>
  <input type="text" id="pronunciationEn">

  <label>Okunuş (AR)</label>
  <input type="text" id="pronunciationAr">

  <label>Meal (TR)</label>
  <textarea id="mealTr" rows="2"></textarea>

  <label>Meal (EN)</label>
  <textarea id="mealEn" rows="2"></textarea>

  <label>Meal (AR)</label>
  <textarea id="mealAr" rows="2"></textarea>

  <label>Toplam Zikir</label>
  <input type="number" id="totalDhikr" value="0">

  <label>Toplam Katılımcı</label>
  <input type="number" id="totalParticipants" value="0">

  <div class="btn-row">
    <button class="save-btn" onclick="saveData()">💾 Kaydet / Güncelle</button>
    <button class="delete-btn" onclick="deleteData()">🗑 Kayıt Sil</button>
  </div>

  <div class="status info" id="status">Panel hazırlanıyor...</div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  import {
    getAuth,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTNOGduGplnuGI0hTUGIGilt_q6ojrCJc",
    authDomain: "namaztakipanalitik-cf0a3.firebaseapp.com",
    projectId: "namaztakipanalitik-cf0a3",
    storageBucket: "namaztakipanalitik-cf0a3.firebasestorage.app",
    messagingSenderId: "753795773645",
    appId: "1:753795773645:web:e73ae2e51cd55fb3722584"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const datePicker = document.getElementById("datePicker");
  const statusEl = document.getElementById("status");

  let authReady = false;

  function setStatus(message, type = "info") {
    statusEl.innerText = message;
    statusEl.className = "status " + type;
  }

  function todayAsInputDate() {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, "0");
    const day = String(today.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  async function initAuth() {
    try {
      setStatus("Giriş hazırlanıyor...", "info");
      await signInAnonymously(auth);
    } catch (error) {
      console.error("Auth hatası:", error);
      setStatus("Giriş yapılamadı: " + error.message, "error");
    }
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      authReady = true;
      setStatus("Panel hazır.", "success");

      if (!datePicker.value) {
        datePicker.value = todayAsInputDate();
      }

      loadData();
    } else {
      authReady = false;
      setStatus("Giriş yapılmadı.", "error");
    }
  });

  function checkAuthReady() {
    if (!authReady) {
      setStatus("Giriş hazırlanıyor. Lütfen tekrar dene.", "info");
      return false;
    }

    return true;
  }

  datePicker.addEventListener("change", loadData);

  window.changeDate = function (offset) {
    if (!datePicker.value) {
      datePicker.value = todayAsInputDate();
    }

    const current = new Date(datePicker.value + "T00:00:00");
    current.setDate(current.getDate() + offset);

    const year = current.getFullYear();
    const month = String(current.getMonth() + 1).padStart(2, "0");
    const day = String(current.getDate()).padStart(2, "0");

    datePicker.value = `${year}-${month}-${day}`;
    loadData();
  };

  async function loadData() {
    if (!checkAuthReady()) return;

    const date = datePicker.value;
    if (!date) return;

    try {
      setStatus("Kayıt yükleniyor...", "info");

      const ref = doc(db, "zikirler", date);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();

        document.getElementById("zikirTextAr").value = data.zikirTextAr || "";
        document.getElementById("pronunciationTr").value = data.pronunciationTr || "";
        document.getElementById("pronunciationEn").value = data.pronunciationEn || "";
        document.getElementById("pronunciationAr").value = data.pronunciationAr || "";
        document.getElementById("mealTr").value = data.mealTr || "";
        document.getElementById("mealEn").value = data.mealEn || "";
        document.getElementById("mealAr").value = data.mealAr || "";
        document.getElementById("totalDhikr").value = data.totalDhikr || 0;
        document.getElementById("totalParticipants").value = data.totalParticipants || 0;

        setStatus("Kayıt yüklendi.", "success");
      } else {
        clearFields();
        setStatus("Bu tarih için kayıt yok. Yeni veri girebilirsin.", "info");
      }
    } catch (error) {
      console.error("Veri yükleme hatası:", error);
      setStatus("Kayıt yüklenemedi: " + error.message, "error");
    }
  }

  function clearFields() {
    document.querySelectorAll("input, textarea").forEach(el => {
      if (el.id === "datePicker") return;

      if (el.type === "number") {
        el.value = 0;
      } else {
        el.value = "";
      }
    });
  }

  window.saveData = async function () {
    if (!checkAuthReady()) return;

    const date = datePicker.value;

    if (!date) {
      alert("Lütfen bir tarih seç!");
      return;
    }

    const data = {
      zikirTextAr: document.getElementById("zikirTextAr").value.trim(),
      pronunciationTr: document.getElementById("pronunciationTr").value.trim(),
      pronunciationEn: document.getElementById("pronunciationEn").value.trim(),
      pronunciationAr: document.getElementById("pronunciationAr").value.trim(),
      mealTr: document.getElementById("mealTr").value.trim(),
      mealEn: document.getElementById("mealEn").value.trim(),
      mealAr: document.getElementById("mealAr").value.trim(),
      totalDhikr: Number(document.getElementById("totalDhikr").value || 0),
      totalParticipants: Number(document.getElementById("totalParticipants").value || 0),
      updatedAt: new Date()
    };

    try {
      setStatus("Kayıt kaydediliyor...", "info");

      const ref = doc(db, "zikirler", date);
      await setDoc(ref, data, { merge: true });

      setStatus("Kayıt başarıyla kaydedildi.", "success");
    } catch (error) {
      console.error("Kaydetme hatası:", error);
      setStatus("Kayıt kaydedilemedi: " + error.message, "error");
    }
  };

  window.deleteData = async function () {
    if (!checkAuthReady()) return;

    const date = datePicker.value;

    if (!date) {
      alert("Lütfen bir tarih seç!");
      return;
    }

    if (!confirm("Bu tarihe ait kaydı silmek istediğine emin misin?")) {
      return;
    }

    try {
      setStatus("Kayıt siliniyor...", "info");

      const ref = doc(db, "zikirler", date);
      await deleteDoc(ref);

      clearFields();
      setStatus("Kayıt silindi.", "success");
    } catch (error) {
      console.error("Silme hatası:", error);
      setStatus("Kayıt silinemedi: " + error.message, "error");
    }
  };

  initAuth();
</script>

</body>
</html>
