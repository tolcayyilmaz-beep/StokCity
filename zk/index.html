<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Zikir Admin Paneli</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      background: #fff;
      padding: 20px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; }
    label { font-weight: bold; margin-top: 10px; display: block; }
    input, textarea, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    textarea { resize: vertical; }
    button {
      background: #2563eb;
      color: white;
      font-size: 16px;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .status {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Zikir Veri Giriş Paneli</h2>

  <label>Tarih Seç</label>
  <input type="date" id="datePicker">

  <label>Zikir (Arapça)</label>
  <textarea id="zikirTextAr" rows="2"></textarea>

  <label>Okunuş (TR)</label>
  <input type="text" id="pronunciationTr">

  <label>Okunuş (EN)</label>
  <input type="text" id="pronunciationEn">

  <label>Okunuş (AR)</label>
  <input type="text" id="pronunciationAr">

  <label>Meal (TR)</label>
  <textarea id="mealTr" rows="2"></textarea>

  <label>Meal (EN)</label>
  <textarea id="mealEn" rows="2"></textarea>

  <label>Meal (AR)</label>
  <textarea id="mealAr" rows="2"></textarea>

  <label>Toplam Zikir</label>
  <input type="number" id="totalDhikr" value="0">

  <label>Toplam Katılımcı</label>
  <input type="number" id="totalParticipants" value="0">

  <button onclick="saveData()">Kaydet / Güncelle</button>

  <div class="status" id="status"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDTNOGduGplnuGI0hTUGIGilt_q6ojrCJc",
  authDomain: "namaztakipanalitik-cf0a3.firebaseapp.com",
  projectId: "namaztakipanalitik-cf0a3",
  storageBucket: "namaztakipanalitik-cf0a3.firebasestorage.app",
  messagingSenderId: "753795773645",
  appId: "1:753795773645:web:e73ae2e51cd55fb3722584"
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const datePicker = document.getElementById("datePicker");

  datePicker.addEventListener("change", loadData);

  async function loadData() {
    const date = datePicker.value;
    if (!date) return;

    const ref = doc(db, "zikirler", date);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("zikirTextAr").value = data.zikirTextAr || "";
      document.getElementById("pronunciationTr").value = data.pronunciationTr || "";
      document.getElementById("pronunciationEn").value = data.pronunciationEn || "";
      document.getElementById("pronunciationAr").value = data.pronunciationAr || "";
      document.getElementById("mealTr").value = data.mealTr || "";
      document.getElementById("mealEn").value = data.mealEn || "";
      document.getElementById("mealAr").value = data.mealAr || "";
      document.getElementById("totalDhikr").value = data.totalDhikr || 0;
      document.getElementById("totalParticipants").value = data.totalParticipants || 0;

      document.getElementById("status").innerText = "Kayıt yüklendi.";
    } else {
      clearFields();
      document.getElementById("status").innerText = "Bu tarih için kayıt yok. Yeni veri girebilirsin.";
    }
  }

function clearFields() {
  document.querySelectorAll("input, textarea").forEach(el => {
    if (el.id === "datePicker") return; // 📅 Tarihi silme

    if (el.type === "number") el.value = 0;
    else el.value = "";
  });
}


  window.saveData = async function () {
    const date = datePicker.value;
    if (!date) {
      alert("Lütfen bir tarih seç!");
      return;
    }

    const data = {
      zikirTextAr: document.getElementById("zikirTextAr").value,
      pronunciationTr: document.getElementById("pronunciationTr").value,
      pronunciationEn: document.getElementById("pronunciationEn").value,
      pronunciationAr: document.getElementById("pronunciationAr").value,
      mealTr: document.getElementById("mealTr").value,
      mealEn: document.getElementById("mealEn").value,
      mealAr: document.getElementById("mealAr").value,
      totalDhikr: Number(document.getElementById("totalDhikr").value),
      totalParticipants: Number(document.getElementById("totalParticipants").value),
    };

    const ref = doc(db, "zikirler", date);
    await setDoc(ref, data, { merge: true });

    document.getElementById("status").innerText = "Kayıt başarıyla kaydedildi.";
  };
</script>

</body>
</html>
